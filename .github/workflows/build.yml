name: webtouri

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: ./rust
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bin: librust_gdextension.so

          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            bin: rust_gdextension.dll

          - runner: macos-latest
            target: x86_64-apple-darwin
            bin: librust_gdextension.dylib

          - runner: macos-latest
            target: aarch64-apple-darwin
            bin: librust_gdextension.dylib

          - runner: ubuntu-22.04
            target: aarch64-linux-android
            bin: librust_gdextension.so

          - runner: ubuntu-22.04
            target: armv7-linux-androideabi
            bin: librust_gdextension.so

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux
      - name: Install Linux dependencies
        if: runner.os == 'Linux' && !contains(matrix.target, 'android')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libssl-dev \
            libfontconfig-dev \
            libx11-dev \
            libxext-dev \
            libxt-dev \
            libxmu-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libwayland-dev \
            pkg-config \
            llvm-14-dev \
            libclang-14-dev \
            clang-14

      - name: Set Linux env
        if: runner.os == 'Linux' && !contains(matrix.target, 'android')
        run: |
          echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV

      # macOS
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config

      # Windows
      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $GITHUB_ENV

      # Android
      - name: Install cargo-ndk
        if: contains(matrix.target, 'android')
        run: |
          cargo install cargo-ndk
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      - name: Setup Android NDK
        if: contains(matrix.target, 'android')
        uses: nttld/setup-ndk@v1.5.0
        with:
          ndk-version: r28b

      - name: Set Android env
        if: contains(matrix.target, 'android')
        run: |
          echo "ANDROID_NATIVE_API_LEVEL=21" >> $GITHUB_ENV
          echo "ANDROID_PLATFORM=android-21" >> $GITHUB_ENV
          echo "ANDROID_API_LEVEL=21" >> $GITHUB_ENV

      # Build
      - name: Build (desktop)
        if: "!contains(matrix.target, 'android')"
        shell: bash
        env:
          MOZJS_ARCHIVE: https://github.com/servo/mozjs/releases
        run: |
          cargo build --verbose --release --target ${{ matrix.target }}

      - name: Build (Android)
        if: contains(matrix.target, 'android')
        shell: bash
        env:
          MOZJS_ARCHIVE: https://github.com/servo/mozjs/releases
        run: |
          cargo ndk -t ${{ matrix.target }} build --release --verbose

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin }}-${{ matrix.target }}
          path: rust/target/${{ matrix.target }}/release/${{ matrix.bin }}

  package:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: package/addons/rust-gdextension
          merge-multiple: true

      - name: Build macOS universal binary
        run: |
          cd package/addons/rust-gdextension
          if ls librust_gdextension-x86_64-apple-darwin.dylib 2>/dev/null | grep -q . && \
             ls librust_gdextension-aarch64-apple-darwin.dylib 2>/dev/null | grep -q .; then
            lipo -create -output librust_gdextension.dylib \
              librust_gdextension-x86_64-apple-darwin.dylib \
              librust_gdextension-aarch64-apple-darwin.dylib
            rm -f librust_gdextension-x86_64-apple-darwin.dylib \
                   librust_gdextension-aarch64-apple-darwin.dylib
          fi

      - name: Copy .gdextension and license
        run: |
          cp addons/rust-gdextension/rust.gdextension package/addons/rust-gdextension/rust.gdextension
          cp LICENSE package/addons/rust-gdextension/ 2>/dev/null || true

      - name: Create zip
        run: |
          cd package
          zip -r ../webtouri.zip addons

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: webtouri
          path: webtouri.zip
