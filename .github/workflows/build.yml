name: webtouri

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: ./rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: librust_gdextension.so

          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            bin: rust_gdextension.dll

          - runner: macos-latest
            target: x86_64-apple-darwin
            bin: librust_gdextension.dylib

          - runner: macos-latest
            target: aarch64-apple-darwin
            bin: librust_gdextension.dylib

          - runner: ubuntu-latest
            target: aarch64-linux-android
            bin: librust_gdextension.so

          - runner: ubuntu-latest
            target: x86_64-linux-android
            bin: librust_gdextension.so

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libssl-dev \
            libfontconfig-dev \
            libx11-dev \
            libxext-dev \
            libxt-dev \
            libxmu-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libwayland-dev \
            pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config

      - name: Setup Android NDK
        if: contains(matrix.target, 'android')
        run: |
          echo "NDK version: $(ls $ANDROID_HOME/ndk/)"
          mkdir -p .cargo
          cat > .cargo/config.toml << 'TOML'
[target.aarch64-linux-android]
linker = "aarch64-linux-android33-clang"
[target.x86_64-linux-android]
linker = "x86_64-linux-android33-clang"
TOML

      - name: Build
        shell: bash
        run: |
          cargo build --verbose --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin }}-${{ matrix.target }}
          path: rust/target/${{ matrix.target }}/release/${{ matrix.bin }}

  package:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: package/addons/rust-gdextension
          merge-multiple: true

      - name: Build macOS universal binary
        run: |
          cd package/addons/rust-gdextension
          if ls librust_gdextension-*.dylib 2>/dev/null | grep -q .; then
            lipo -create -output librust_gdextension.dylib \
              librust_gdextension-x86_64-apple-darwin.dylib \
              librust_gdextension-aarch64-apple-darwin.dylib
          fi

      - name: Copy .gdextension and license
        run: |
          cp addons/rust-gdextension/rust.gdextension package/addons/rust-gdextension/rust.gdextension
          cp LICENSE package/addons/rust-gdextension/ 2>/dev/null || true

      - name: Create zip
        run: |
          cd package
          zip -r ../webtouri.zip addons

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: webtouri
          path: webtouri.zip
